<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SBTI人格测试 - 新一代MBTI测试，通过30道题目分析你的15个人格维度，揭示你的真实人格类型。有趣、准确的在线人格测试工具。" />
  <meta name="keywords" content="SBTI,人格测试,MBTI,性格测试,心理测试,人格分析" />
  <meta name="author" content="SBTI人格测试" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#4d6a53" />
  
  <meta property="og:title" content="SBTI人格测试 - 新一代MBTI测试" />
  <meta property="og:description" content="通过30道题目分析你的15个人格维度，揭示你的真实人格类型" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://example.com/sbti-og-image.jpg" />
  <meta property="og:url" content="https://sbti.example.com" />
  
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SBTI人格测试 - 新一代MBTI测试" />
  <meta name="twitter:description" content="通过30道题目分析你的15个人格维度，揭示你的真实人格类型" />
  
  <title>SBTI人格测试 - 新一代MBTI测试 | 性格分析</title>
  <link rel="stylesheet" href="style.css">
  
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "SBTI人格测试",
    "description": "新一代MBTI人格测试，通过30道题目分析15个人格维度",
    "url": "https://sbti.example.com",
    "applicationCategory": "PersonalityTest",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "CNY"
    }
  }
  </script>
</head>
<body>
  <div class="shell">
    <section id="intro" class="screen active">
      <div class="hero card hero-minimal">
        <h1>MBTI已经过时，SBTI来了。</h1>
        <p class="hero-sub">新一代人格测试，探索你的15个人格维度，发现真实的自己</p>
        <div class="hero-actions hero-actions-single">
          <button id="startBtn" class="btn-primary">开始测试</button>
        </div>
      </div>
    </section>

    <section id="test" class="screen">
      <div class="test-wrap card">
        <div class="topbar">
          <div class="progress"><span id="progressBar"></span></div>
          <div class="progress-text" id="progressText">0 / 31</div>
        </div>

        <div id="questionList" class="question-list"></div>

        <div class="actions-bottom">
          <div class="hint" id="testHint">全选完才会放行。世界已经够乱了，起码把题做完整。</div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <button id="submitBtn" class="btn-primary" disabled>提交并查看结果</button>
          </div>
        </div>
      </div>
    </section>

    
    <section id="result" class="screen">
      <div class="result-wrap card">
        <div class="result-layout">
          <div class="result-top">
            <div class="poster-box" id="posterBox">
              <img id="posterImage" class="poster-image" alt="人格结果图" />
              <div id="posterCaption" class="poster-caption">怎么样，被我拿捏了吧？</div>
            </div>

            <div class="type-box">
              <div class="type-kicker" id="resultModeKicker">你的主类型</div>
              <div class="type-name" id="resultTypeName">CTRL（拿捏者）</div>
              <div class="match" id="matchBadge">匹配度 92%</div>
              <div class="type-subname" id="resultTypeSub">系统备注会显示在这里。</div>
            </div>
          </div>

          <div class="analysis-box">
            <h3>该人格的简单解读</h3>
            <p id="resultDesc"></p>
          </div>

          <div class="dim-box">
            <h3>十五维度评分</h3>
            <div id="dimList" class="dim-list"></div>
          </div>

          <div class="note-box">
            <h3>友情提示</h3>
            <p id="funNote">本测试仅供娱乐，别拿它当诊断、面试、相亲、分手、招魂、算命或人生判决书。</p>
          </div>
        </div>

        <div class="result-actions">
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="restartBtn" class="btn-secondary">重新测试</button>
            <button id="toTopBtn" class="btn-primary">回到首页</button>
          </div>
        </div>
      </div>
    </section>

  </div>

  
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
